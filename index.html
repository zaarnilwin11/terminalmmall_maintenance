<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terminal M Mall - Splash Break</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#ff4e50,#f9d423);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.container{
max-width:700px;
padding:40px;
}

.brand{
font-size:48px;
font-weight:800;
letter-spacing:2px;
margin-bottom:20px;
}

.message{
font-size:22px;
line-height:1.6;
margin-bottom:40px;
}

.countdown{
font-size:40px;
font-weight:bold;
letter-spacing:3px;
}

</style>
</head>

<body>

<div class="container">

<div class="brand">Terminal M Mall</div>

<div class="message">
💦 Our digital mall is joining the Thingyan splash!<br><br>
While everyone is celebrating Myanmar New Year,<br>
we're giving our system a refreshing water break.<br><br>
We'll reopen after the festival with a brighter,
faster and happier experience.
</div>

<div class="countdown" id="countdown"></div>

</div>

<script>
// Target: 2026-04-16 18:00:00 Myanmar Time (UTC+6:30)
// This equals 2026-04-16 11:30:00 UTC
var countDownDate = Date.UTC(2026, 4, 16, 15, 00, 0); // months are 0‑based: 3 = April

var x = setInterval(function() {
  var now = new Date().getTime(); // current time in milliseconds since epoch (UTC)
  var distance = countDownDate - now;

  // Time calculations
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  // Display result
  document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

  // If countdown is finished
  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "We're Back!";
  }
}, 1000);
</script>

</body>
</html>
